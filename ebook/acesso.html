<html lang="pt-BR">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acesso ao conteúdo</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2e;
      --line: #22314f;
      --text: #e8edf7;
      --muted: #a6b3cc;
      --accent: #57a6ff;
      --danger: #ff7f9f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #0b1220 0%, #0f1730 100%);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    .panel {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 30px 24px 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }
    label {
      display: block;
      font-size: 13px;
      margin: 12px 0 6px;
      color: #cde2ff;
    }
    input {
      width: 100%;
      border: 1px solid #2a3e63;
      background: #091326;
      color: var(--text);
      border-radius: 10px;
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #031024;
      background: linear-gradient(135deg, #57a6ff, #7dc2ff);
    }
    .error {
      display: none;
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #8aa1c6;
    }
    .consent {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .consent input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .credentials {
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid #2a3e63;
      border-radius: 10px;
      background: #0d1a33;
      color: #cde2ff;
      font-size: 14px;
      line-height: 1.6;
    }
    .credentials b {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Área de acesso</h1>
    <p>Entre com login e senha para abrir o conteúdo.</p>
    <div class="credentials"><b>Login:</b> winner<br><b>Senha:</b> bookwriter</div>
    <form id="loginForm">
      <label for="login">Login</label>
      <input id="login" name="login" autocomplete="username" required />
      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" autocomplete="current-password" required />
      <label class="consent" for="consent">
        <input id="consent" name="consent" type="checkbox" required />
        <span>I consent to the processing of my submitted data for access and support communication, in accordance with applicable data protection regulations.</span>
      </label>
      <button type="submit">Entrar agora</button>
      <div class="error" id="errorMsg">Login ou senha inválidos.</div>
    </form>
    <div class="hint">Se tiver qualquer dúvida, fala comigo no suporte direto.</div>
  </main>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const target = new URLSearchParams(window.location.search).get('next') || './ebook_kenya_v3.html';

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      const login = String(document.getElementById('login').value || '').trim().toLowerCase();
      const senha = String(document.getElementById('senha').value || '').trim();

      if (login === 'winner' && senha === 'bookwriter') {
        sessionStorage.setItem('ebook_access_ok', '1');
        window.location.href = target;
        return;
      }

      errorMsg.style.display = 'block';
    });
  </script>
</body>
</html>
